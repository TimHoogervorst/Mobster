services:
  mobster:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - mobster_data:/data
      - mobster_workspaces:/workspaces
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:?AUTH_GITHUB_ID is required}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:?AUTH_GITHUB_SECRET is required}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    read_only: true

volumes:
  mobster_data:
  mobster_workspaces:
